---
- name: Create a VM on OpenShift Virtualization
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vm_name: apache-vm
    vm_project: vm-migration-test
    storage_class: nfs-storage-class
    storage_size: 15Gi
    memory_size: 2Gi
    cpu_cores: 2
    cpu_sockets: 1
    cpu_threads: 1
    cloud_init_password: password
    ssh_timeout: 600
    network_attachment: br-ex-network

  tasks:
    - name: Display VM configuration
      ansible.builtin.debug:
        msg:
          - "Creating VM: {{ vm_name }}"
          - "Namespace: {{ vm_project }}"
          - "Memory: {{ memory_size }}"
          - "CPU Cores: {{ cpu_cores }}"
          - "Storage Class: {{ storage_class }}"
          - "Network: {{ network_attachment }}"

    - name: Provision Virtual Machine in OpenShift
      kubernetes.core.k8s:
        state: present
        validate_certs: no
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ vm_project }}"
            labels:
              app: "{{ vm_name }}"
          spec:
            running: true
            dataVolumeTemplates:
              - metadata:
                  name: "{{ vm_name }}"
                  annotations:
                    cdi.kubevirt.io/storage.bind.immediate.requested: "true"
                spec:
                  source:
                    pvc:
                      name: rhel9-golden-image
                      namespace: vm-migration-test
                  storage:
                    storageClassName: "{{ storage_class }}"
                    accessModes:
                      - ReadWriteMany
                    volumeMode: Filesystem
                    resources:
                      requests:
                        storage: "{{ storage_size }}"
            template:
              metadata:
                labels:
                  kubevirt.io/domain: "{{ vm_name }}"
              spec:
                domain:
                  cpu:
                    cores: "{{ cpu_cores }}"
                    sockets: "{{ cpu_sockets }}"
                    threads: "{{ cpu_threads }}"
                  memory:
                    guest: "{{ memory_size }}"
                  devices:
                    disks:
                      - name: rootdisk
                        disk:
                          bus: virtio
                      - name: cloudinitdisk
                        disk:
                          bus: virtio
                    interfaces:
                      - name: default
                        bridge: {}
                networks:
                  - name: default
                    multus:
                      networkName: "{{ network_attachment }}"
                volumes:
                  - name: rootdisk
                    dataVolume:
                      name: "{{ vm_name }}"
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      networkData: |-
                        version: 2
                        ethernets:
                          eth0:
                            dhcp4: true
                            dhcp4-overrides:
                              use-dns: true
                      userData: |-
                        #cloud-config
                        user: root
                        password: {{ cloud_init_password }}
                        chpasswd: { expire: False }
                        ssh_pwauth: True
                        runcmd:
                          - sed -i 's/^#PermitRootLogin./PermitRootLogin yes/' /etc/ssh/sshd_config
                          - systemctl restart sshd
                          - sleep 30
      register: vm_creation

    - name: Display VM creation result
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} provisioned successfully in namespace {{ vm_project }}"
      when: vm_creation.changed

    - name: Wait for DataVolume to be created and ready
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        name: "{{ vm_name }}"
        namespace: "{{ vm_project }}"
        validate_certs: no
      register: dv_info
      until:
        - dv_info.resources is defined
        - dv_info.resources | length > 0
        - dv_info.resources[0].status.phase is defined
        - dv_info.resources[0].status.phase == "Succeeded"
      retries: 60
      delay: 10

    - name: Display DataVolume status
      ansible.builtin.debug:
        msg: "DataVolume for {{ vm_name }} is ready (Phase: {{ dv_info.resources[0].status.phase }})"

    - name: Wait for VM to be running
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        name: "{{ vm_name }}"
        namespace: "{{ vm_project }}"
        validate_certs: no
      register: vmi_info
      until:
        - vmi_info.resources is defined
        - vmi_info.resources | length > 0
        - vmi_info.resources[0].status.phase is defined
        - vmi_info.resources[0].status.phase == "Running"
      retries: 60
      delay: 10

    - name: Display VM running status
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} is now running"

    - name: Wait for VM to initialize networking
      ansible.builtin.pause:
        seconds: 60

    - name: Get VM network interface information with IPv4 retry loop
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        name: "{{ vm_name }}"
        namespace: "{{ vm_project }}"
        validate_certs: no
      register: vmi_network_info
      retries: 20
      delay: 15
      until: >-
        vmi_network_info.resources is defined and
        vmi_network_info.resources | length > 0 and
        vmi_network_info.resources[0].status.interfaces is defined and
        vmi_network_info.resources[0].status.interfaces | length > 0 and
        (vmi_network_info.resources[0].status.interfaces
          | map(attribute='ipAddresses', default=[])
          | flatten
          | select('match', '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$')
          | list | length) > 0

    - name: Collect all IP addresses from all interfaces
      ansible.builtin.set_fact:
        vm_all_ips: >-
          {{ vmi_network_info.resources[0].status.interfaces
             | map(attribute='ipAddresses', default=[])
             | flatten }}

    - name: Filter strictly IPv4 addresses (exclude IPv6 and link-local)
      ansible.builtin.set_fact:
        vm_ipv4_list: >-
          {{ vm_all_ips
             | select('match', '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$')
             | reject('match', '^169\.254\.')
             | reject('match', '^127\.')
             | list }}

    - name: Set primary IPv4 address
      ansible.builtin.set_fact:
        vm_ip: "{{ vm_ipv4_list | first | default('') }}"

    - name: Display assigned IPv4 address
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} IPv4: {{ vm_ip }}"
      when: vm_ip != ''

    - name: Fail if no IPv4 address found
      ansible.builtin.fail:
        msg: "No IPv4 address assigned to VM {{ vm_name }}. All IPs found: {{ vm_all_ips }}"
      when: vm_ip == ''

    - name: Check if IP is reachable via ping
      ansible.builtin.shell: |
        ping -c 3 -W 2 {{ vm_ip }}
      register: ping_result
      failed_when: false
      changed_when: false

    - name: Display ping result
      ansible.builtin.debug:
        msg: "Ping test: {{ 'SUCCESS' if ping_result.rc == 0 else 'FAILED - VM may not be fully booted' }}"

    - name: Wait for cloud-init to complete (check via virtctl)
      ansible.builtin.shell: |
        virtctl guestosinfo {{ vm_name }} -n {{ vm_project }} 2>/dev/null | grep -i "agent connected" || echo "NOT_READY"
      register: guest_agent_check
      retries: 30
      delay: 10
      until: "'agent connected' in guest_agent_check.stdout.lower()"
      failed_when: false
      changed_when: false

    - name: Display guest agent status
      ansible.builtin.debug:
        msg: "Guest agent status: {{ guest_agent_check.stdout }}"

    - name: Wait extended time for SSH service to start
      ansible.builtin.pause:
        seconds: 120
        prompt: "Giving VM {{ vm_name }} extra time to complete boot and start SSH..."

    - name: Check SSH port with nc (netcat)
      ansible.builtin.shell: |
        nc -zv -w 5 {{ vm_ip }} 22 2>&1
      register: nc_check
      retries: 20
      delay: 15
      until: nc_check.rc == 0
      failed_when: false
      changed_when: false

    - name: Display netcat SSH check result
      ansible.builtin.debug:
        msg: "SSH port check: {{ 'Port 22 is OPEN' if nc_check.rc == 0 else 'Port 22 is CLOSED or filtered' }}"

    - name: Check if SSH is actually the problem or network routing issue
      ansible.builtin.shell: |
        traceroute -m 5 -w 1 {{ vm_ip }} 2>&1 | head -10
      register: traceroute_result
      failed_when: false
      changed_when: false
      when: nc_check.rc != 0

    - name: Display network path
      ansible.builtin.debug:
        msg: "{{ traceroute_result.stdout_lines }}"
      when: nc_check.rc != 0 and traceroute_result.stdout_lines is defined

    - name: Try to check VM console for boot messages
      ansible.builtin.shell: |
        timeout 10 virtctl console {{ vm_name }} -n {{ vm_project }} 2>&1 || echo "Console check timed out"
      register: console_check
      failed_when: false
      changed_when: false
      when: nc_check.rc != 0

    - name: Display console output for debugging
      ansible.builtin.debug:
        msg: "{{ console_check.stdout_lines | default(['No console output available']) }}"
      when: nc_check.rc != 0

    - name: Final SSH connectivity test
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 5
        timeout: 180
        sleep: 10
        state: started
      register: ssh_wait
      failed_when: false

    - name: Handle SSH failure gracefully
      block:
        - name: Get VM pod logs for troubleshooting
          ansible.builtin.shell: |
            oc get pods -n {{ vm_project }} -l kubevirt.io/domain={{ vm_name }} -o name | xargs -I {} oc logs {} -n {{ vm_project }} --tail=50
          register: vm_pod_logs
          failed_when: false
          changed_when: false

        - name: Display VM pod logs
          ansible.builtin.debug:
            msg: "{{ vm_pod_logs.stdout_lines | default(['No pod logs available']) }}"

        - name: Check VM status and conditions
          kubernetes.core.k8s_info:
            api_version: kubevirt.io/v1
            kind: VirtualMachineInstance
            name: "{{ vm_name }}"
            namespace: "{{ vm_project }}"
            validate_certs: no
          register: vmi_status_check

        - name: Display VM conditions
          ansible.builtin.debug:
            msg: "VM Conditions: {{ vmi_status_check.resources[0].status.conditions | default([]) }}"

        - name: Provide troubleshooting information
          ansible.builtin.debug:
            msg:
              - "============================================"
              - "SSH CONNECTION FAILED - Troubleshooting Info"
              - "============================================"
              - "VM Name: {{ vm_name }}"
              - "VM IP: {{ vm_ip }}"
              - "VM Phase: {{ vmi_status_check.resources[0].status.phase | default('Unknown') }}"
              - ""
              - "Possible causes:"
              - "1. Cloud-init failed to configure SSH"
              - "2. Network configuration issue (bridge/multus)"
              - "3. Firewall blocking port 22"
              - "4. Golden image doesn't have SSH installed/enabled"
              - "5. Network attachment {{ network_attachment }} misconfigured"
              - ""
              - "Manual verification steps:"
              - "  oc get vmi {{ vm_name }} -n {{ vm_project }}"
              - "  virtctl console {{ vm_name }} -n {{ vm_project }}"
              - "  virtctl ssh root@{{ vm_name }} -n {{ vm_project }}"
              - "============================================"

        - name: Mark as warning but continue
          ansible.builtin.debug:
            msg: "VM deployed but SSH verification failed. Continuing with deployment summary..."
      when: ssh_wait.failed | default(false)

    - name: Display SSH availability
      ansible.builtin.debug:
        msg: "SSH is now available on {{ vm_ip }}:22"
      when: not (ssh_wait.failed | default(false))

    - name: Pass VM IP to next workflow job
      ansible.builtin.set_stats:
        data:
          vm_ip: "{{ vm_ip }}"
          vm_name: "{{ vm_name }}"
          vm_project: "{{ vm_project }}"
          ssh_available: "{{ 'yes' if not (ssh_wait.failed | default(false)) else 'no' }}"
        per_host: no

    - name: Get VM information
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ vm_name }}"
        namespace: "{{ vm_project }}"
        validate_certs: no
      register: vm_info

    - name: Display VM information
      ansible.builtin.debug:
        msg:
          - "VM Name: {{ vm_info.resources[0].metadata.name }}"
          - "Namespace: {{ vm_info.resources[0].metadata.namespace }}"
          - "CPU Cores: {{ vm_info.resources[0].spec.template.spec.domain.cpu.cores }}"
          - "CPU Sockets: {{ vm_info.resources[0].spec.template.spec.domain.cpu.sockets }}"
          - "CPU Threads: {{ vm_info.resources[0].spec.template.spec.domain.cpu.threads }}"
          - "Memory: {{ vm_info.resources[0].spec.template.spec.domain.memory.guest }}"
          - "Storage Size: {{ storage_size }}"
          - "Storage Class: {{ storage_class }}"
          - "VM Status: {{ vm_info.resources[0].status.printableStatus | default('Starting') }}"
          - "Network: {{ network_attachment }}"
          - "IPv4 Address: {{ vm_ip }}"
          - "SSH Available: {{ 'Yes' if not (ssh_wait.failed | default(false)) else 'No - Manual verification needed' }}"

    - name: Deployment Summary
      ansible.builtin.debug:
        msg:
          - "======================================"
          - "VM Deployment {{ 'Complete' if not (ssh_wait.failed | default(false)) else 'Partially Complete' }}"
          - "======================================"
          - "VM Name: {{ vm_name }}"
          - "IPv4 Address: {{ vm_ip }}"
          - "Username: root"
          - "Password: {{ cloud_init_password }}"
          - "SSH Access: ssh root@{{ vm_ip }}"
          - "Network: {{ network_attachment }}"
          - "{{ 'SSH verified and ready!' if not (ssh_wait.failed | default(false)) else 'WARNING: SSH not responding - may need manual intervention' }}"
          - "=========================================="
